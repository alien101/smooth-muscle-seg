# MedNeXt-2D: MONAI create_mednext factory (variants S / B / M / L).
# Larger kernel_size (3 | 5 | 7) increases receptive field.
#
# Usage:
#   python train.py --config configs/mednext.yaml
#   python train.py --config configs/mednext.yaml model.variant=B model.kernel_size=5

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  data_dir:   "data"
  image_size: 512
  num_classes: 1
  val_fraction: 0.15
  test_fraction: 0.05
  num_workers: 4

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  architecture: "mednext"
  in_channels: 3
  variant: "S"               # S | B | M | L  (Small → Large)
  kernel_size: 3             # depthwise kernel size (3 | 5 | 7)

# ── Training ──────────────────────────────────────────────────────────────────
training:
  max_epochs: 1000
  batch_size: 6
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  loss: "dice_bce"
  scheduler: "cosine"
  early_stopping_patience: 15
  precision: "16-mixed"
  method: "standard"

# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  flip_p: 0.5
  rotate_limit: 90
  brightness_limit: 0.2
  contrast_limit: 0.2
  hue_shift_limit: 10
  elastic_p: 0.3
  grid_distortion_p: 0.3

# ── Logging / Checkpointing ────────────────────────────────────────────────────
logging:
  log_dir: "logs"
  experiment_name: "mednext_seg_{variant}_{kernel_size}"
  save_top_k: 3
  monitor: "val/dice"
  monitor_mode: "max"
